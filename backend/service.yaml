# Google Cloud Run service configuration
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ciphermate-backend
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: gcr.io/PROJECT_ID/ciphermate-backend:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: APP_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: DATABASE_URL
              key: latest
        - name: AUTH0_DOMAIN
          valueFrom:
            secretKeyRef:
              name: AUTH0_DOMAIN
              key: latest
        - name: AUTH0_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: AUTH0_CLIENT_ID
              key: latest
        - name: AUTH0_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: AUTH0_CLIENT_SECRET
              key: latest
        - name: AUTH0_AUDIENCE
          valueFrom:
            secretKeyRef:
              name: AUTH0_AUDIENCE
              key: latest
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: GEMINI_API_KEY
              key: latest
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: GOOGLE_CLIENT_ID
              key: latest
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: GOOGLE_CLIENT_SECRET
              key: latest
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: GITHUB_CLIENT_ID
              key: latest
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: GITHUB_CLIENT_SECRET
              key: latest
        - name: SLACK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: SLACK_CLIENT_ID
              key: latest
        - name: SLACK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: SLACK_CLIENT_SECRET
              key: latest
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
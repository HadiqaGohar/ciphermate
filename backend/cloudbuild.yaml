# Google Cloud Build configuration for CipherMate Backend
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/ciphermate-backend:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/ciphermate-backend:latest',
      '.'
    ]
    dir: 'backend'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ciphermate-backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ciphermate-backend:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'ciphermate-backend',
      '--image', 'gcr.io/$PROJECT_ID/ciphermate-backend:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '1Gi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--concurrency', '80',
      '--timeout', '300',
      '--set-env-vars', 'APP_ENV=production',
      '--set-secrets', 'DATABASE_URL=DATABASE_URL:latest,AUTH0_CLIENT_SECRET=AUTH0_CLIENT_SECRET:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest'
    ]

images:
  - 'gcr.io/$PROJECT_ID/ciphermate-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ciphermate-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
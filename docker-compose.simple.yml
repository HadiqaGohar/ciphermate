version: '3.8'


services:
  # Backend API (Simplified)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.simple
    container_name: ciphermate-backend-simple
    environment:
      - PORT=8080
      - DISABLE_DATABASE=true
      - DISABLE_REDIS=true
      - DISABLE_AGENTS=true
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ciphermate-frontend-simple
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - AUTH0_SECRET=${AUTH0_SECRET:-use-openssl-rand-hex-32-to-generate}
      - AUTH0_BASE_URL=http://localhost:3000
      - AUTH0_ISSUER_BASE_URL=${AUTH0_ISSUER_BASE_URL:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next